name: Eloquent
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"

settings:
  base:
    PRODUCT_NAME: Eloquent
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    # TODO: set to your 10-character Apple Developer Team ID before distribution.
    DEVELOPMENT_TEAM: ""
    # App version shown in the App Store and About box.
    MARKETING_VERSION: "1.0"
    # Build number — increment on every upload to App Store Connect.
    CURRENT_PROJECT_VERSION: "1"

targets:
  Eloquent:
    type: application
    platform: macOS
    sources:
      - path: Eloquent
      - path: Eloquent/App/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        # TODO: change to a reverse-DNS identifier for a domain you control.
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.Eloquent
        INFOPLIST_FILE: Eloquent/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Eloquent/App/Eloquent.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
    dependencies:
      - framework: Cocoa.framework
        embed: false
      - framework: AVFoundation.framework
        embed: false
      - framework: Speech.framework
        embed: false
      - framework: CoreAudio.framework
        embed: false
